<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Legacy Render API hostname breaks CORS from GitHub Pages. This runs before React / SW-cached
      bundles load and rewrites any fetch() to the correct API host.
    -->
    <script>
      (function () {
        try {
          var h = location.hostname || "";
          var p = location.pathname || "";
          var href = location.href || "";
          var inRepo =
            /court-legal-chatbot/i.test(p) ||
            /court-legal-chatbot/i.test(location.search || "") ||
            /court-legal-chatbot/i.test(location.hash || "") ||
            /court-legal-chatbot/i.test(href);
          if (!h.endsWith("github.io") || !inRepo) return;
          var good = "https://court-legal-chatbot-1.onrender.com";
          var re = /https?:\/\/court-legal-chatbot\.onrender\.com/gi;
          var origFetch = window.fetch;
          window.fetch = function (input, init) {
            if (typeof input === "string") {
              input = input.replace(re, good);
            } else if (input && typeof Request !== "undefined" && input instanceof Request) {
              var u = input.url.replace(re, good);
              if (u !== input.url) input = new Request(u, input);
            }
            return origFetch.call(this, input, init);
          };
        } catch (e) {}
      })();
    </script>

    <!-- Viewport (safe-area for notched phones; avoids 100vh jump on mobile browsers) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Dynamic Title -->
    <title>CAL Legal Chatbot</title>
    <meta
      name="description"
      content="Illinois legal information and referrals. Connect with resources for housing, family, education, and more. General information only—not legal advice."
    />
    <meta property="og:title" content="CAL Legal Resource Navigator" />
    <meta
      property="og:description"
      content="Illinois legal information and referrals for self-represented litigants. Not legal advice."
    />
    <meta property="og:type" content="website" />

    <!-- Manifest (dynamic switch enabled) -->
    <link rel="manifest" id="manifest-link" href="%BASE_URL%manifest.json" />

    <!-- Theme color -->
    <meta name="theme-color" content="#1d4ed8" id="theme-color-meta" />

    <!-- Mobile support -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="%BASE_URL%cal_logo.png" id="app-favicon" />
    <link rel="apple-touch-icon" href="%BASE_URL%cal_logo.png" id="apple-icon" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 🔒 DISCREET MODE SCRIPT (RUNS BEFORE REACT LOADS) -->
    <script>
      (function () {
        const basePath = "%BASE_URL%";
        const params = new URLSearchParams(window.location.search);
        const isDiscreet = params.get("mode") === "discreet";

        if (isDiscreet) {
          // Change title immediately
          document.title = "Resource Portal";

          // Change browser theme color
          const themeMeta = document.getElementById("theme-color-meta");
          if (themeMeta) {
            themeMeta.setAttribute("content", "#6b7280");
          }

          // 🔥 SWITCH MANIFEST (for disguised install)
          const manifestLink = document.getElementById("manifest-link");
          if (manifestLink) {
            manifestLink.setAttribute("href", `${basePath}manifest-discreet.json`);
          }

          // Optional: keep same icon OR replace with neutral later
          const favicon = document.getElementById("app-favicon");
          const appleIcon = document.getElementById("apple-icon");

          if (favicon) favicon.setAttribute("href", `${basePath}cal_logo.png`);
          if (appleIcon) appleIcon.setAttribute("href", `${basePath}cal_logo.png`);

          // Apply discreet mode class BEFORE React loads
          document.documentElement.classList.add("discreet-mode");
          document.body.classList.add("discreet-mode");
        }
      })();
    </script>

    <!-- Base styles -->
    <style>
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: #f4f7fb;
      }

      /* Discreet fallback */
      body.discreet-mode {
        background: #f5f5f5;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
